<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mr. Ganick 有机农药目录 · Organic Catalogue</title>
  <meta name="apple-mobile-web-app-title" content="Mr. Ganick" />
  <meta name="application-name" content="Mr. Ganick" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <style>
    /* ====================================================================
       Mr. Ganick organic catalogue — design tokens
       Identity: a field guide built around the catalogue's own 4-tier
       tank-mix colour code (green / orange / red / black). That colour
       system IS the brand, so it's the visual spine of the whole app.
       ==================================================================== */
    :root{
      --ink:#15241c;          /* deep leaf ink for text        */
      --ink-soft:#4b5d52;     /* muted body text               */
      --paper:#f5f3ea;        /* warm catalogue paper          */
      --paper-2:#fbfaf4;      /* card surface                  */
      --leaf:#1f6b3b;         /* Mr. Ganick brand green        */
      --leaf-dk:#15512c;
      --leaf-lt:#e6f0e6;
      --sun:#f4b400;          /* "单用/混用" badge yellow       */
      /* mix-code palette (from catalogue cover) */
      --c-green:#2f9e44;  --c-green-bg:#e7f6ea;
      --c-orange:#e8820c; --c-orange-bg:#fdf0df;
      --c-red:#e03131;    --c-red-bg:#fdeaea;
      --c-black:#2a2a2a;  --c-black-bg:#ededed;
      --line:#dad6c6;
      --shadow:0 1px 2px rgba(20,40,28,.06),0 6px 18px rgba(20,40,28,.06);
      --shadow-lg:0 10px 30px rgba(20,40,28,.14);
    }
    *,*::before,*::after{box-sizing:border-box;}
    html{font-size:16px;-webkit-text-size-adjust:100%;}
    html.scale-m{font-size:17.5px;} html.scale-l{font-size:19.5px;}
    body{
      margin:0;background:var(--paper);color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
      line-height:1.5;-webkit-font-smoothing:antialiased;
    }
    button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}
    .nb{white-space:nowrap;}
    ::-webkit-scrollbar{width:9px;height:9px;}
    ::-webkit-scrollbar-thumb{background:rgba(31,107,59,.25);border-radius:10px;}
    .no-sb::-webkit-scrollbar{display:none;}
    .no-sb{-ms-overflow-style:none;scrollbar-width:none;}
    .fade-in{animation:fade .28s ease-out both;}
    @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    @media (prefers-reduced-motion:reduce){.fade-in{animation:none;}}
    :focus-visible{outline:2.5px solid var(--leaf);outline-offset:2px;border-radius:4px;}
    .tile{transition:border-color .15s ease, transform .12s ease, box-shadow .15s ease;}
    .tile:hover{border-color:rgba(31,107,59,.45);}
    .tile:active{transform:scale(.97);}
    .fab{transition:transform .14s ease, background .14s ease;}
    .fab:hover{transform:scale(1.05);background:var(--paper-2);}
    .fab:active{transform:scale(.96);}
    .fab{transition:transform .15s ease, background .15s ease;}
    .fab:hover{transform:scale(1.05);background:var(--paper-2);}
    .fab:active{transform:scale(.96);}
    /* ---- responsive layout: phone-first, flows wider on tablet/desktop ---- */
    .wrap{max-width:760px;margin:0 auto;}
    @media (min-width:1000px){ .wrap{max-width:1000px;} }
    @media (min-width:1280px){ .wrap{max-width:1180px;} }
    /* pest / disease / category tiles: 3 on phone, more as the screen widens */
    .grid-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    @media (min-width:640px){ .grid-tiles{grid-template-columns:repeat(4,1fr);gap:10px;} }
    @media (min-width:900px){ .grid-tiles{grid-template-columns:repeat(5,1fr);gap:12px;} }
    @media (min-width:1200px){ .grid-tiles{grid-template-columns:repeat(6,1fr);} }
    /* product cards: single column on phone, multi-column on wider screens */
    .grid-cards{display:grid;grid-template-columns:1fr;gap:10px;}
    @media (min-width:760px){ .grid-cards{grid-template-columns:repeat(2,1fr);} }
    @media (min-width:1200px){ .grid-cards{grid-template-columns:repeat(3,1fr);} }
  </style>

  <!-- Mr. Ganick logo favicon -->
  <link rel="icon" type="image/png" href="icon-192.png" />
</head>
<body>
  <div id="root"></div>

/* =====================  PRODUCT CARD (brochure)  ========================== */
const MIX_COLOR = { green: "var(--c-green)", orange: "var(--c-orange)", red: "var(--c-red)", black: "var(--c-black)" };
// Catalogue sort: by the catalogue's own category order (insecticide → fungicide
// → bio → soil → adjuvant, taken from CATS key order), then A–Z by product name
// within each category. Latin/ASCII name sort is used for stable, predictable order.
const CAT_RANK = Object.fromEntries(Object.keys(CATS).map((k, i) => [k, i]));
function catSorted(list) {
  return list.slice().sort((a, b) => {
    const ra = CAT_RANK[a.cat] ?? 99, rb = CAT_RANK[b.cat] ?? 99;
    if (ra !== rb) return ra - rb;
    return a.name.localeCompare(b.name, "en", { sensitivity: "base", numeric: true });
  });
}

// Sort favourites to the top, in the order they were favourited (a Set keeps
// insertion order; re-favouriting moves an item to the end of that sequence).
// Non-favourites keep their original list order.
function favSorted(list, favs) {
  if (!favs || favs.size === 0) return list;
  const order = [...favs];
  const rank = id => { const i = order.indexOf(id); return i === -1 ? Infinity : i; };
  return list.map((p, i) => [p, i]).sort((a, b) => {
    const ra = rank(a[0].id), rb = rank(b[0].id);
    return ra !== rb ? ra - rb : a[1] - b[1]; // favourites by fav-order, rest stable
  }).map(x => x[0]);
}

// Product image with upload-override + tap-to-enlarge. Default is the PDF-extracted
// image (PRODUCT_IMG); a user-uploaded image (IndexedDB) takes precedence. The upload
// button lets the operator drop in an official image during testing.
// In-app image cropper. Shows the picked image with a drag/resize crop box locked
// to a fixed aspect ratio (matches the card placeholder, 4:3). On confirm it draws
// the selected region to a canvas and returns a data URL. Pure canvas, offline.
const CROP_ASPECT = 4 / 3;
function ImageCropper({ srcUrl, lang, onConfirm, onCancel }) {
  const t = T[lang];
  const wrapRef = useRef(null);
  const imgRef = useRef(null);
  const [layout, setLayout] = useState(null);   // {dispW, dispH} of the shown image
  const [box, setBox] = useState(null);          // crop rect in display px {x,y,w,h}
  const drag = useRef(null);

  // Fit image into the stage, then seed a centered max crop box at the aspect ratio.
  const onImgLoad = () => {
    const wrap = wrapRef.current, img = imgRef.current;
    if (!wrap || !img) return;
    const maxW = wrap.clientWidth, maxH = Math.min(window.innerHeight * 0.6, 520);
    const ar = img.naturalWidth / img.naturalHeight;
    let dispW = maxW, dispH = dispW / ar;
    if (dispH > maxH) { dispH = maxH; dispW = dispH * ar; }
    setLayout({ dispW, dispH });
    // largest centered box with CROP_ASPECT that fits inside the image
    let bw = dispW, bh = bw / CROP_ASPECT;
    if (bh > dispH) { bh = dispH; bw = bh * CROP_ASPECT; }
    setBox({ x: (dispW - bw) / 2, y: (dispH - bh) / 2, w: bw, h: bh });
  };

  const clamp = (b) => {
    if (!layout) return b;
    let { x, y, w, h } = b;
    w = Math.max(40, Math.min(w, layout.dispW));
    h = w / CROP_ASPECT;
    if (h > layout.dispH) { h = layout.dispH; w = h * CROP_ASPECT; }
    x = Math.max(0, Math.min(x, layout.dispW - w));
    y = Math.max(0, Math.min(y, layout.dispH - h));
    return { x, y, w, h };
  };

  const ptr = (e) => { const t0 = e.touches ? e.touches[0] : e; return { px: t0.clientX, py: t0.clientY }; };
  const startMove = (e) => { e.preventDefault(); const p = ptr(e); drag.current = { mode: "move", ...p, box: { ...box } }; };
  const startResize = (e) => { e.preventDefault(); e.stopPropagation(); const p = ptr(e); drag.current = { mode: "resize", ...p, box: { ...box } }; };
  const onMove = (e) => {
    if (!drag.current) return;
    const p = ptr(e); const d = drag.current;
    const dx = p.px - d.px, dy = p.py - d.py;
    if (d.mode === "move") setBox(clamp({ ...d.box, x: d.box.x + dx, y: d.box.y + dy }));
    else setBox(clamp({ ...d.box, w: d.box.w + dx }));   // resize from corner, height follows ratio
  };
  const endDrag = () => { drag.current = null; };
  useEffect(() => {
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", endDrag);
    window.addEventListener("touchmove", onMove, { passive: false }); window.addEventListener("touchend", endDrag);
    return () => {
      window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", endDrag);
      window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", endDrag);
    };
  });

  const confirm = () => {
    const img = imgRef.current;
    if (!img || !layout || !box) return;
    const scale = img.naturalWidth / layout.dispW;   // display → natural px
    const sx = box.x * scale, sy = box.y * scale, sw = box.w * scale, sh = box.h * scale;
    // output sized to the card (cap long edge ~ 900px for sharpness without bloat)
    const outW = Math.min(900, Math.round(sw)), outH = Math.round(outW / CROP_ASPECT);
    const cv = document.createElement("canvas");
    cv.width = outW; cv.height = outH;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, outW, outH);
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
    onConfirm(cv.toDataURL("image/jpeg", 0.9));
  };

  return h("div", {
    style: { position: "fixed", inset: 0, background: "rgba(10,16,12,.9)", zIndex: 9999, display: "flex",
      flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 16, gap: 14 } },
    h("div", { style: { color: "#fff", fontSize: ".85rem", fontWeight: 700 } }, t.cropTitle),
    h("div", { ref: wrapRef, style: { position: "relative", width: "100%", maxWidth: 460, touchAction: "none" } },
      h("div", { style: { position: "relative", width: layout ? layout.dispW : "100%", height: layout ? layout.dispH : "auto", margin: "0 auto" } },
        h("img", { ref: imgRef, src: srcUrl, onLoad: onImgLoad, draggable: false,
          style: { width: layout ? layout.dispW : "100%", height: layout ? layout.dispH : "auto", display: "block", userSelect: "none" } }),
        layout && box && h("div", {
          onMouseDown: startMove, onTouchStart: startMove,
          style: { position: "absolute", left: box.x, top: box.y, width: box.w, height: box.h,
            border: "2px solid #fff", boxShadow: "0 0 0 9999px rgba(0,0,0,.5)", cursor: "move", boxSizing: "border-box" } },
          h("div", {
            onMouseDown: startResize, onTouchStart: startResize,
            style: { position: "absolute", right: -11, bottom: -11, width: 22, height: 22, borderRadius: 99,
              background: "#fff", border: "2px solid var(--leaf)", cursor: "nwse-resize" } })),
      ),
    ),
    h("div", { style: { display: "flex", gap: 10 } },
      h("button", { onClick: onCancel,
        style: { fontSize: ".82rem", fontWeight: 700, color: "#fff", background: "rgba(255,255,255,.16)",
          border: "none", padding: "9px 18px", borderRadius: 99, cursor: "pointer" } }, t.cropCancel),
      h("button", { onClick: confirm,
        style: { fontSize: ".82rem", fontWeight: 800, color: "#fff", background: "var(--leaf)",
          border: "none", padding: "9px 20px", borderRadius: 99, cursor: "pointer" } }, t.cropConfirm)),
  );
}

function ProductImage({ product, lang, embedded }) {
  const t = T[lang];
  const fallback = PRODUCT_IMG[product.id] || null;
  const [src, setSrc] = useState(fallback);
  const [busy, setBusy] = useState(false);
  const [cropSrc, setCropSrc] = useState(null);   // raw picked image awaiting crop
  useEffect(() => {
    let live = true;
    imgGet(product.id).then(over => { if (live && over) setSrc(over); });
    return () => { live = false; };
  }, [product.id]);

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";   // allow re-picking the same file later
    if (!f) return;
    if (!/^image\//.test(f.type)) { alert(t.imgBadType); return; }
    const rd = new FileReader();
    rd.onload = () => setCropSrc(rd.result);        // open cropper
    rd.onerror = () => alert(t.imgReadErr);
    rd.readAsDataURL(f);
  };
  const onCropped = async (dataUrl) => {
    setCropSrc(null); setBusy(true);
    await imgSet(product.id, dataUrl); setSrc(dataUrl); setBusy(false);
  };
  const onReset = async () => { await imgDel(product.id); setSrc(fallback); };

  if (embedded) {
    // Compact thumbnail that lives inside the coloured header banner (top-right).
    return h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 5, flex: "0 0 auto" } },
      h("div", {
        style: { width: 84, height: 84, background: "rgba(255,255,255,.92)", border: "1px solid rgba(255,255,255,.6)",
          borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden",
          boxShadow: "0 2px 6px rgba(0,0,0,.12)" } },
        src
          ? h("img", { src, alt: product.name, style: { maxWidth: "92%", maxHeight: "92%", objectFit: "contain" } })
          : h("span", { style: { color: "var(--ink-soft)", fontSize: ".64rem", textAlign: "center", padding: "0 4px" } }, t.imgNone)),
      h("label", { style: { fontSize: ".62rem", fontWeight: 700, color: "#fff", background: "rgba(255,255,255,.22)",
        border: "1px solid rgba(255,255,255,.45)", padding: "3px 8px", borderRadius: 99, cursor: "pointer", textAlign: "center", whiteSpace: "nowrap" } },
        busy ? t.imgUploading : ("⬆ " + t.imgUpload),
        h("input", { id: "product-image-file", name: "product-image-file", type: "file", accept: "image/*", onChange: onFile, style: { display: "none" } })),
      src && src !== fallback && h("button", { onClick: onReset,
        style: { fontSize: ".62rem", fontWeight: 700, color: "#fff", background: "transparent",
          border: "1px solid rgba(255,255,255,.45)", padding: "3px 8px", borderRadius: 99, cursor: "pointer", whiteSpace: "nowrap" } }, t.imgReset),
      cropSrc && h(ImageCropper, { srcUrl: cropSrc, lang, onConfirm: onCropped, onCancel: () => setCropSrc(null) }),
    );
  }

  return h("div", { className: "pd-image", style: { margin: "0", display: "flex", flexDirection: "column", gap: 6 } },
    h("div", {
      style: { width: "100%", aspectRatio: "1 / 1", background: "var(--paper-2)", border: "1px solid var(--line)",
        borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden",
        boxShadow: "var(--shadow)" } },
      src
        ? h("img", { src, alt: product.name, style: { maxWidth: "92%", maxHeight: "92%", objectFit: "contain" } })
        : h("span", { style: { color: "var(--ink-soft)", fontSize: ".72rem", textAlign: "center", padding: "0 6px" } }, t.imgNone)),
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" } },
      h("label", { style: { fontSize: ".68rem", fontWeight: 700, color: "var(--leaf-dk)", background: "var(--leaf-lt)",
        border: "1px solid var(--leaf)", padding: "4px 9px", borderRadius: 99, cursor: "pointer", textAlign: "center" } },
        busy ? t.imgUploading : ("⬆ " + t.imgUpload),
        h("input", { id: "product-image-file", name: "product-image-file", type: "file", accept: "image/*", onChange: onFile, style: { display: "none" } })),
      src && src !== fallback && h("button", { onClick: onReset,
        style: { fontSize: ".68rem", fontWeight: 700, color: "var(--ink-soft)", background: "#fff",
          border: "1px solid var(--line)", padding: "4px 9px", borderRadius: 99, cursor: "pointer" } }, t.imgReset)),
    cropSrc && h(ImageCropper, { srcUrl: cropSrc, lang, onConfirm: onCropped, onCancel: () => setCropSrc(null) }),
  );

/* ===========  PROBLEM DETAIL — unified product + calculator view  ========= */
// Tapping a problem tile lands here. Shows the Mr. Ganick product(s) for that
// problem (combined as one treatment when 2+), each with its specs, dose block,
// mix partners, and a calculator pre-set to this problem's use.
function ProblemDetail({ problem, lang, onBack }) {
  const t = T[lang];
  let matches = PRODUCTS_FOR_PROBLEM[problem.id] || [];
  // Reciprocal organic combo: two Ganick products that each list the other as an
  // organicPartner are ONE combined treatment (e.g. BST GOLD + BST BOOST for severe
  // black-heart). Neither is primary — collapse to a single card so it reads as one
  // treatment, not "Product 1 / Product 2". The surviving card's combo view already
  // shows both products as equals.
  const isReciprocalCombo = matches.length === 2 &&
    matches.every(({ use }) => use.organicPartners && use.organicPartners.length > 0) &&
    matches.some(({ product }) =>
      matches.some(({ use }) => use.organicPartners.some(op => op.name.indexOf(product.name) === 0)));
  if (isReciprocalCombo) matches = [matches[0]];
  const multi = matches.length > 1;
  return h("div", { className: "fade-in" },
    // problem header
    h("div", { style: { display: "flex", alignItems: "center", gap: 11, marginBottom: 4 } },
      h("div", { style: { width: 50, height: 50, borderRadius: 14, background: "#fff", border: "1px solid var(--line)", display: "flex", alignItems: "center", justifyContent: "center", flex: "0 0 auto", boxShadow: "var(--shadow)" } },
        h(ProblemArt, { id: problem.id, size: 36 })),
      h("div", null,
        h("div", { style: { fontWeight: 800, fontSize: "1.2rem", lineHeight: 1.2 } }, lang === "zh" ? problem.zh : problem.en),
        h("div", { style: { fontSize: ".82rem", color: "var(--ink-soft)" } }, lang === "zh" ? problem.en : problem.zh),
      ),
    ),
    // combined-treatment hint when 2+ products
    multi && h("p", { style: { fontSize: ".82rem", color: "var(--leaf-dk)", fontWeight: 600, background: "#fff", border: "1px dashed var(--c-green)", borderRadius: 11, padding: "9px 12px", margin: "13px 0" } },
      "🤝 " + t.combinedTreatment),
    // product(s) — each: name + specs + active ing + dose block + calc
    h("div", { style: { display: "grid", gap: 16, marginTop: 13 } },
      matches.map(({ product, use }, i) => {
        const useIdx = product.uses.indexOf(use);
        // For a reciprocal organic combo, build a combined title from both product names.
        const comboNames = isReciprocalCombo
          ? [product.name].concat((use.organicPartners || []).map(op => op.name.replace(/\s*\(.*\)$/, ""))).join(" + ")
          : null;
        return h("div", { key: product.id, style: { background: "var(--paper-2)", border: "1px solid var(--line)", borderRadius: 16, overflow: "hidden", boxShadow: "var(--shadow)" } },
          // product name strip — matches the product's PDF label banner colour
          h("div", { style: { background: product.banner || "var(--leaf)", color: "#fff", padding: "11px 14px" } },
            isReciprocalCombo && h("div", { style: { fontSize: ".68rem", fontWeight: 700, color: "rgba(255,255,255,.85)", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 2 } },
              "✦ " + (lang === "zh" ? "有机搭配方案 (两款齐用)" : "Organic combo treatment (both required)")),
            multi && h("div", { style: { fontSize: ".68rem", fontWeight: 700, color: "rgba(255,255,255,.8)", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 2 } },
              (lang === "zh" ? "产品 " : "Product ") + (i + 1) + " / " + matches.length),
            h("div", { style: { display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" } },
              h("span", { style: { fontWeight: 800, fontSize: "1.12rem" } }, comboNames || product.name),
              !isReciprocalCombo && h("span", { style: { fontWeight: 700, fontSize: ".95rem", color: "rgba(255,255,255,.82)" } }, product.zh)),
            h("div", { style: { fontSize: ".8rem", color: "rgba(255,255,255,.9)", marginTop: 4 } }, lang === "zh" ? product.blurb_zh : product.blurb_en),
          ),
          h("div", { style: { padding: "13px 14px", display: "grid", gap: 13 } },
            // specs row
            h("div", { style: { display: "flex", gap: 7, flexWrap: "wrap" } },
              h(MixBadge, { cls: product.mixClass, lang }),
              h("span", { style: { background: "#fff", border: "1px solid var(--line)", padding: "3px 10px", borderRadius: 99, fontSize: ".74rem", fontWeight: 700, color: "var(--ink-soft)" } }, t.form + ": " + product.form),
              h("span", { style: { background: "#fff", border: "1px solid var(--line)", padding: "3px 10px", borderRadius: 99, fontSize: ".74rem", fontWeight: 700, color: "var(--ink-soft)" } }, product.packs.join(" · ")),
            ),
            product.pending && h("p", { style: { fontSize: ".8rem", color: "#8a6d00", background: "#fdf6e3", borderRadius: 10, padding: "8px 11px", margin: 0 } }, "⚠ " + t.pendingNote),
            // active ingredients
            h("div", { style: { background: "#fff", border: "1px solid var(--line)", borderRadius: 12, padding: "10px 12px" } },
              h("div", { style: { fontWeight: 700, fontSize: ".74rem", color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: ".03em", marginBottom: 5 } }, t.activeIng),

          ),

const PROBLEM_SYNONYMS = {
  aphid: ["蚜", "腻虫", "greenfly", "plant lice"],

const _norm = s => (s || "").toLowerCase();

// Searchable blob per problem: zh + en + id-words + synonyms.
const PROBLEM_SEARCH = Object.fromEntries(PROBLEMS.map(p => {
  const parts = [p.zh, p.en, p.id.replace(/_/g, " "), ...(PROBLEM_SYNONYMS[p.id] || [])];
  return [p.id, _norm(parts.join(" "))];
}));

// Searchable blob per product: name + zh + form + category (both langs) +
// blurbs + active ingredients (en+zh) + mix-partner names + the zh/en names of
// every problem it treats (so a pest/disease term surfaces the product too).
const PRODUCT_SEARCH = Object.fromEntries(PRODUCTS.map(p => {
  const parts = [p.name, p.zh, p.form, CATS[p.cat].en, CATS[p.cat].zh, p.blurb_en, p.blurb_zh];
  p.ai.forEach(a => { parts.push(a.en, a.zh); });
  p.uses.forEach(u => {
    const prob = PROBLEM_BY_ID[u.problem];
    if (prob) { parts.push(prob.zh, prob.en); parts.push(...(PROBLEM_SYNONYMS[prob.id] || [])); }
    (u.partners || []).forEach(pt => parts.push(pt.name));
  });
  return [p.id, _norm(parts.join(" "))];
}));

/* =====================  LOOKUP TAB  ====================================== */
function LookupTab({ lang, onOpenProblem, onOpenProduct, favs, onToggleFav }) {
  const t = T[lang];
  const [q, setQ] = useState("");
  const [crop, setCrop] = useState("all");

  const norm = s => (s || "").toLowerCase();
  const query = norm(q).trim();
  // split into terms; every term must be found somewhere in the item's blob
  // (works in either language, any word order, partial matches allowed)
  const terms = query ? query.split(/\s+/).filter(Boolean) : [];
  const blobMatches = blob => terms.every(term => blob.indexOf(term) !== -1);

  const probMatches = useMemo(() => PROBLEMS.filter(p => {
    if (p.kind === "adjuvant") return false;
    if (crop !== "all") {
      // "general" = broad pests that hit fruit/veg/durian, but NOT oil palm —
      // the catalogue only documents Ganoderma for oil palm.
      const generalCounts = p.crops.includes("general") && crop !== "oilpalm";
      if (!p.crops.includes(crop) && !generalCounts) return false;
    }
    if (!terms.length) return true;
    return blobMatches(PROBLEM_SEARCH[p.id]);
  }), [query, crop]);

  const prodMatches = useMemo(() => {
    if (!terms.length) return [];
    return PRODUCTS.filter(p => blobMatches(PRODUCT_SEARCH[p.id]));
  }, [query]);

  const pests = probMatches.filter(p => p.kind === "pest");
  const diseases = probMatches.filter(p => p.kind === "disease");

  return h("div", null,
    // search bar
    h("div", { style: { position: "relative", marginBottom: 11 } },

      h("input", {

        value: q, onChange: e => setQ(e.target.value), placeholder: t.searchPh, type: "search",
        style: { width: "100%", padding: "12px 38px 12px 42px", borderRadius: 13, border: "1px solid var(--line)",
          background: "var(--paper-2)", fontSize: "1rem", color: "var(--ink)" },
      }),
      q && h("button", { onClick: () => setQ(""), "aria-label": "clear",
        style: { position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", color: "var(--ink-soft)" } }, h(Ico, { d: I.x, size: 18 })),
    ),
    !q && h("p", { style: { fontSize: ".78rem", color: "var(--ink-soft)", margin: "-4px 2px 11px" } }, t.tip + ": " + t.searchHint),
    // crop filter
    h("div", { style: { display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 7, marginBottom: 14 } },
      ["all", "durian", "oilpalm", "vegetable", "fruit"].map(c => {
        const on = crop === c;
        return h("button", {
          key: c, onClick: () => setCrop(c), className: "tile",
          style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4,
            padding: "9px 2px", borderRadius: 13, minHeight: 64,
            border: "1.5px solid " + (on ? "var(--leaf)" : "var(--line)"),
            background: on ? "var(--leaf-lt)" : "#fff",
            boxShadow: on ? "none" : "var(--shadow)" } },
          h(CropArt, { id: c, size: 26 }),
          h("span", { style: { fontSize: ".68rem", fontWeight: on ? 800 : 600, lineHeight: 1.1, textAlign: "center",
            color: on ? "var(--leaf-dk)" : "var(--ink-soft)" } }, CROP_LABELS[c][lang]));
      }),
    ),
    // results
    prodMatches.length > 0 && h(Section, { title: t.tabBrowse, lang },
      h("div", { className: "grid-cards" }, favSorted(prodMatches, favs).map(p => h(ProductCard, { key: p.id, product: p, lang, onOpen: onOpenProduct, isFav: favs && favs.has(p.id), onToggleFav })))),
    pests.length > 0 && h(Section, { title: t.pests, lang },
      h(ProblemGrid, { items: pests, lang, onOpen: onOpenProblem })),
    diseases.length > 0 && h(Section, { title: t.diseases, lang },

// Parse a dose string into scalable numeric segments while preserving text.
// We scale every number that is part of the catalogue's 10 L base.
// Localize unit words inside a dose string. Canonical doses are stored in Chinese
// (e.g. "汤匙"); for the English UI we swap to the English equivalent. Numbers and
// metric units (g/ml/L/kg) are language-neutral and left untouched.
// Translate the Chinese annotations embedded in dose strings for the English UI.
// Doses are stored canonically with Chinese notes (crop names, severity tiers, units);
// in English mode we swap them. Order matters: longer phrases before shorter ones.
const DOSE_TERMS_EN = [
  ["5年以下榴莲树", "durian trees under 5 yrs"],
  ["重度治疗", "severe"], ["维护", "maintenance"], ["严重", "severe"],
  ["榴莲树苗", "durian sapling"], ["榴莲树", "durian tree"],
  ["番石榴", "guava"], ["黄梨", "pineapple"], ["火龙果", "dragonfruit"],
  ["木瓜", "papaya"], ["榴莲", "durian"], ["辣椒", "chilli"], ["杨桃", "starfruit"],
  ["汤匙", "spoon"],
];
function locDose(str, lang) {
  if (!str || lang !== "en") return str;
  let out = str;
  for (const [zh, en] of DOSE_TERMS_EN) out = out.split(zh).join(en);
  return out;
}

function scaleDose(str, factor) {
  if (!str || str === "—") return str;
  // First scale every number, keeping the original units/text.
  let out = str.replace(/\d+(?:\.\d+)?/g, (m) => {
    const v = parseFloat(m) * factor;
    if (v === 0) return "0";
    let s = v >= 10 ? v.toFixed(1) : v.toFixed(v < 1 ? 2 : 1);
    if (s.indexOf(".") !== -1) s = s.replace(/0+$/, "").replace(/\.$/, "");
    return s;
  });
  // Then tidy big volumes: "1250 ml" or "1250–2500 ml" → litres ("1.25 L" / "1.25–2.5 L").
  // Cleaner to read and friendlier on the eye for large mixes. Same with grams → kg.
  out = prettyUnits(out);
  return out;
}

// Convert a number-or-range immediately followed by ml/g into L/kg when any value
// in that group is >= 1000. Operates per "<numbers> <unit>" group so units stay
// consistent within an expression. Leaves everything else untouched.
function prettyUnits(s) {
  // group = a run of numbers/ranges/separators, then a unit (ml or g, not kg/L)
  return s.replace(/((?:\d+(?:\.\d+)?(?:\s*[–\-~]\s*)?)+)\s*(ml|g)\b/gi, (full, nums, unit) => {
    const u = unit.toLowerCase();
    const factorUnit = 1000;          // ml→L and g→kg both /1000
    const bigUnit = u === "ml" ? "L" : "kg";
    const vals = nums.match(/\d+(?:\.\d+)?/g).map(parseFloat);
    if (!vals.some(v => v >= factorUnit)) return full; // keep small ones as-is
    let i = 0;
    const converted = nums.replace(/\d+(?:\.\d+)?/g, () => {
      const v = vals[i++] / factorUnit;
      let t = v.toFixed(2);
      if (t.indexOf(".") !== -1) t = t.replace(/0+$/, "").replace(/\.$/, "");
      return t;
    });
    return converted + " " + bigUnit;
  });
}

// InlineCalc — dose calculator locked to one product. If the product has more
// than one use, an internal use-selector appears (unless `fixedUseIdx` given,
// in which case the calculator stays on that single problem's use).
function InlineCalc({ product, fixedUseIdx, lang, initialUseIdx }) {
  const t = T[lang];
  const [useIdx, setUseIdx] = useState(fixedUseIdx != null ? fixedUseIdx : (initialUseIdx || 0));
  const idx = fixedUseIdx != null ? fixedUseIdx : Math.min(useIdx, product.uses.length - 1);
  const use = product.uses[idx];
  // Tank capacity persists across launches — a farmer uses the same sprayer daily,
  // so the last-used size becomes the default everywhere. Falls back to 10 L.
  const [tank, setTank] = useState(() => {
    const v = parseInt(lsGet("ganick_tank", "10"), 10);
    return (v >= 1 && v <= 1000) ? v : 10;
  });
  const setTankPersist = (v) => { const n = Math.max(1, Math.min(1000, v)); setTank(n); lsSet("ganick_tank", String(n)); };
  const hasPartners = !!(use.partners && use.partners.length > 0);          // chemical add-on available
  const isCombo = !!(use.organicPartners && use.organicPartners.length > 0); // this PROBLEM is a required organic pair

  // Method model depends on the problem type:
  //   COMBO problem (e.g. stem borer = BST + LEPID): the two Ganick organic
  //     products always go in together — there is no valid "solo". States:
  //       "combo"     — both organic products
  //       "comboChem" — both organic products + a chemical add-on
  //   SOLO problem: a single Ganick organic product. States:
  //       "solo"      — organic alone
  //       "mix"       — organic + a chemical
  const baseMethod = isCombo ? "combo" : "solo";       // default / primary state
  const chemMethod = isCombo ? "comboChem" : "mix";    // chemical-added state
  const [method, setMethod] = useState(baseMethod);

  // Keep the selected method valid when the problem (use) changes underneath us.
  useEffect(() => {
    const allowed = [baseMethod].concat(hasPartners ? [chemMethod] : []);
    if (!allowed.includes(method)) setMethod(baseMethod);
  }, [baseMethod, chemMethod, hasPartners, method]);
  const effMethod = (method === chemMethod && hasPartners) ? chemMethod : baseMethod;
  const chemActive = effMethod === chemMethod;         // is a chemical add-on shown?

  const baseL = use.baseL || 10;
  const factor = tank / baseL;
  // Organic Silwet penetration booster — offered ONLY for disease problems (incl.
  // wet-season blight, which is a disease). Off by default: it is an optional, pricier
  // add-on, so the farmer opts in rather than being upsold. Silwet is dosed 5 ml / 20 L.
  const prob = PROBLEM_BY_ID[use.problem];
  const showSilwet = prob && prob.kind === "disease" && product.id !== "silwet";
  const [silwet, setSilwet] = useState(false);
  useEffect(() => { if (!showSilwet && silwet) setSilwet(false); }, [showSilwet, silwet]);
  const silwetDose = locDose(scaleDose("5 ml", tank / 20), lang);
  // The primary product's own dose. For a SOLO problem, chemical-added state uses the
  // (often lower) mix dose. For a COMBO problem, both organic products always start from
  // their solo/combo dose and are HALVED when a chemical is added (the chemical shares the load).
  const organicFactor = (isCombo && chemActive) ? factor * 0.5 : factor;
  const base = isCombo ? use.solo : (chemActive ? use.mix : use.solo);
  const scaled = locDose(scaleDose(base, isCombo ? organicFactor : factor), lang);
  const tanks = [10, 15, 16, 20, 200, 1000];

  return h("div", { style: { background: "var(--paper-2)", border: "1px solid var(--line)", borderRadius: 14, padding: "13px 14px", boxShadow: "var(--shadow)" } },
    h("div", { style: { display: "flex", alignItems: "center", gap: 7, marginBottom: 12 } },
      h(Ico, { d: I.calc, size: 17 }),
      h("span", { style: { fontWeight: 800, fontSize: ".95rem" } }, t.calcTitle)),
    // use selector (only when product has multiple uses and not fixed)
    fixedUseIdx == null && product.uses.length > 1 && h(Field, { label: t.chooseUse },
      h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
        product.uses.map((u, i) => {
          const pr = PROBLEM_BY_ID[u.problem];
          const on = idx === i;
          return h("button", {
            key: i, onClick: () => setUseIdx(i),
            style: { flex: "1 1 auto", padding: "10px 14px", borderRadius: 11, fontWeight: 700, fontSize: ".84rem",
              cursor: "pointer", textAlign: "center",
              border: "1px solid " + (on ? "var(--leaf)" : "var(--line)"),
              background: on ? "var(--leaf)" : "#fff",
              color: on ? "#fff" : "var(--ink-soft)" },
          }, lang === "zh" ? pr.zh : pr.en);
        }))),
    // method — two states: the primary (solo OR organic combo), plus a chemical-added
    // variant when chemical partners exist. Combo problems never offer a "solo" option.
    h(Field, { label: t.doseType },
      h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
        [baseMethod].concat(hasPartners ? [chemMethod] : []).map(m => {
          const active = effMethod === m;
          // organic-combo states use the brand sun/amber accent; solo & chemical-mix use leaf green
          const isComboState = m === "combo" || m === "comboChem";
          const accent = isComboState ? "var(--sun)" : "var(--leaf)";
          const activeFg = isComboState ? "#3a2e00" : "#fff";
          const label = m === "solo" ? t.useSolo : m === "mix" ? t.useMix : m === "combo" ? t.useCombo : t.useComboChem;
          return h("button", {
            key: m, onClick: () => setMethod(m),
            style: { flex: "1 1 40%", padding: "10px", borderRadius: 11, fontWeight: 700, fontSize: ".84rem",
              cursor: "pointer",
              border: "1px solid " + (active ? accent : "var(--line)"),
              background: active ? accent : "#fff",
              color: active ? activeFg : "var(--ink-soft)" },
          }, label);
        }))),
    // hint: combo problems require BOTH organic products together
    isCombo && h("p", { style: { fontSize: ".74rem", color: "#8a6d00", margin: "-8px 2px 12px", lineHeight: 1.45, fontWeight: 600 } }, t.comboRequired),
    // note when a solo problem has no chemical partner
    !isCombo && !hasPartners && h("p", { style: { fontSize: ".74rem", color: "var(--ink-soft)", margin: "-8px 2px 12px", lineHeight: 1.45 } }, t.noMixPartner),
    // Organic Silwet booster — disease problems only, opt-in
    showSilwet && h("div", { style: { marginBottom: 14, background: silwet ? "#eef4fb" : "#fff", border: "1px solid " + (silwet ? "#0d1c41" : "var(--line)"), borderRadius: 12, padding: "10px 12px" } },
      h("label", { style: { display: "flex", alignItems: "center", gap: 10, cursor: "pointer" } },
        h("input", { type: "checkbox", checked: silwet, onChange: e => setSilwet(e.target.checked), style: { width: 18, height: 18, accentColor: "#0d1c41", flex: "0 0 auto" } }),
        h("span", { style: { fontSize: ".84rem", fontWeight: 700, color: silwet ? "#0d1c41" : "var(--ink-soft)" } }, t.silwetToggle)),
      h("p", { style: { fontSize: ".72rem", color: "var(--ink-soft)", lineHeight: 1.45, margin: "6px 0 0 28px" } }, t.silwetHint)),
    // tank
    h(Field, { label: t.tankSize + " (L)" },
      h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8 } },
        tanks.map(v => h("button", {
          key: v, onClick: () => setTankPersist(v),
          style: { padding: "7px 14px", borderRadius: 99, fontWeight: 700, fontSize: ".84rem",
            border: "1px solid " + (tank === v ? "var(--leaf)" : "var(--line)"),
            background: tank === v ? "var(--leaf)" : "#fff", color: tank === v ? "#fff" : "var(--ink-soft)" },
        }, v + "L"))),
      h("input", { id: "tank-size", name: "tank-size", "aria-label": lang === "zh" ? "水箱容量 (L)" : "Tank size (L)", type: "number", min: 1, max: 1000, value: tank,
        placeholder: lang === "zh" ? "自定义 (L)" : "Custom (L)",
        onChange: e => setTankPersist(+e.target.value || 1),
        style: { ...selStyle, width: 150, background: "#fff" } })),
    // result — for a COMBO problem, both required products live in ONE card as the
    // recommended dosage. For a solo problem, the single scaled figure.

// Online shop landing — offline QR of the shop link, a direct open button, and a
// WhatsApp share button. QR is rendered as crisp SVG via the inlined qrcode lib.
const SHOP_URL = "https://babashop.com.my/collections/farmer-merchandise";

function qrSvg(text, size) {
  try {
    const qr = window.qrcode(0, "M");
    qr.addData(text);
    qr.make();
    const n = qr.getModuleCount();
    const cell = size / n;
    let rects = "";
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        if (qr.isDark(r, c))
          rects += `<rect x="${(c * cell).toFixed(2)}" y="${(r * cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" shape-rendering="crispEdges"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#114b2d">${rects}</g></svg>`;
  } catch (e) { return null; }
}

// Safe localStorage helpers — persistence works on the deployed PWA; the
// try/catch keeps it harmless in sandboxed/private contexts where it may throw.
// IndexedDB store for user-uploaded product images. Unlike localStorage (~5MB,
// text only) this holds binary-sized data URLs comfortably. Keyed by product id.
// Used during demo/testing to drop in official images; nothing is uploaded anywhere.
const IMG_DB = "ganick_imgs", IMG_STORE = "imgs";
function imgDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IMG_DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IMG_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function imgGet(id) {
  try {
    const db = await imgDB();
    return await new Promise((res) => {
      const tx = db.transaction(IMG_STORE, "readonly").objectStore(IMG_STORE).get(id);
      tx.onsuccess = () => res(tx.result || null);
      tx.onerror = () => res(null);
    });
  } catch (e) { return null; }
}
async function imgSet(id, dataUrl) {
  try {
    const db = await imgDB();
    return await new Promise((res) => {
      const tx = db.transaction(IMG_STORE, "readwrite").objectStore(IMG_STORE).put(dataUrl, id);
      tx.onsuccess = () => res(true);
      tx.onerror = () => res(false);
    });
  } catch (e) { return false; }
}
async function imgDel(id) {
  try {
    const db = await imgDB();
    return await new Promise((res) => {
      const tx = db.transaction(IMG_STORE, "readwrite").objectStore(IMG_STORE).delete(id);
      tx.onsuccess = () => res(true);
      tx.onerror = () => res(false);
    });
  } catch (e) { return false; }
}

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v == null ? fallback : v; }
  catch (e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, val); } catch (e) {}
}

function App() {
  // Defaults: Chinese language, medium text size. Persisted across launches
  // until the user picks something else.
  const [lang, setLang] = useState(() => {
    const saved = lsGet("ganick_lang", null);
    return (saved === "zh" || saved === "en") ? saved : "zh";
  });
  const [scale, setScale] = useState(() => {
    const saved = lsGet("ganick_scale", null);
    return (saved === "s" || saved === "m" || saved === "l") ? saved : "m";
  });
  // Favourite products — a Set of product ids, persisted across launches.
  const [favs, setFavs] = useState(() => {
    try { const a = JSON.parse(lsGet("ganick_favs", "[]")); return new Set(Array.isArray(a) ? a : []); }
    catch (e) { return new Set(); }
  });
  const toggleFav = (id) => setFavs(prev => {
    const next = new Set(prev);

          style: { display: "inline-flex", alignItems: "center", justifyContent: "center", width: 38, height: 38, borderRadius: 11,
            background: (!inDetail && tab === "about") ? "var(--leaf-lt)" : "#fff",
            color: (!inDetail && tab === "about") ? "var(--leaf-dk)" : "var(--ink-soft)",
            border: "1px solid " + ((!inDetail && tab === "about") ? "var(--leaf)" : "var(--line)"),
            boxShadow: "var(--shadow)", flex: "0 0 auto" } },
          h(Ico, { d: I.info, size: 18 })),
        // lang — Layers icon + label, matching the MoA app's language toggle
        h("button", { onClick: () => setLang(l => l === "zh" ? "en" : "zh"),
          "aria-label": lang === "zh" ? "Switch to English" : "切换中文",
          style: { display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 12px", borderRadius: 11,
            background: "#fff", color: "var(--ink-soft)", border: "1px solid var(--line)", boxShadow: "var(--shadow)",
            fontWeight: 800, fontSize: ".82rem" } },
          h(Ico, { d: I.layers, size: 16 }),
          lang === "zh" ? "EN" : "中文"),
      )),
    // body — with a top-right back-to-home arrow when branched off the home screen
    h("main", { className: "wrap", style: { padding: "16px 16px 0", position: "relative" } },
      (inDetail || tab !== "lookup") && h("div", { style: { display: "flex", justifyContent: "flex-end", marginBottom: 6 } },
        h("button", {
          onClick: () => { closeDetail(); setTab("lookup"); window.scrollTo({ top: 0, behavior: "smooth" }); },
          className: "fab",
          "aria-label": lang === "zh" ? "回到首页" : "Back to home",
          title: lang === "zh" ? "回到首页" : "Back to home",
          style: { width: 40, height: 40, borderRadius: 99, background: "#fff", color: "var(--leaf-dk)", border: "2px solid var(--leaf-dk)",
            display: "flex", alignItems: "center", justifyContent: "center", flex: "0 0 auto", boxShadow: "var(--shadow)" } },
          h(Ico, { d: I.arrowLeft, size: 19 }))),
      h("div", { className: "fade-in", key: (inDetail || tab) }, body)),
    // jump-to-home FAB — fixed left of the back-to-top FAB; shows after scrolling
    // (same trigger as back-to-top) and only when branched off the home screen.
    showTop && (inDetail || tab !== "lookup") && h("button", {
      onClick: () => { closeDetail(); setTab("lookup"); window.scrollTo({ top: 0, behavior: "smooth" }); },
      className: "fab",
      "aria-label": lang === "zh" ? "回到首页" : "Back to home",
      title: lang === "zh" ? "回到首页" : "Back to home",
      style: { position: "fixed", right: 74, bottom: "calc(76px + env(safe-area-inset-bottom,0))", width: 48, height: 48, borderRadius: 99, background: "#fff", color: "var(--leaf-dk)", border: "2px solid var(--leaf-dk)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "var(--shadow-lg)", zIndex: 45 } },
      h(Ico, { d: I.arrowLeft, size: 20 })),
    // back-to-top
    showTop && h("button", { onClick: () => window.scrollTo({ top: 0, behavior: "smooth" }), "aria-label": "top",
      className: "fab",
      style: { position: "fixed", right: 16, bottom: "calc(76px + env(safe-area-inset-bottom,0))", width: 48, height: 48, borderRadius: 99, background: "#fff", color: "var(--leaf-dk)", border: "2px solid var(--leaf-dk)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "var(--shadow-lg)", zIndex: 45 } },
      h(Ico, { d: I.arrowUp, size: 20 })),
    // bottom nav
    h("nav", { style: { position: "fixed", bottom: 0, left: 0, right: 0, background: "var(--paper-2)", borderTop: "1px solid var(--line)", paddingBottom: "env(safe-area-inset-bottom,0)", zIndex: 50, boxShadow: "0 -2px 12px rgba(20,40,28,.06)" } },
      h("div", { className: "wrap", style: { display: "flex" } },
        navTabs.map(it => {
          const active = !inDetail && tab === it.id;
          const inner = [
            h(Ico, { d: it.icon, size: 21, fill: active ? "rgba(31,107,59,.08)" : "none" }),
            h("span", { style: { fontSize: ".7rem" } }, it.label),
          ];
          const style = { flex: 1, padding: "9px 4px 7px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            color: active ? "var(--leaf)" : "var(--ink-soft)", fontWeight: active ? 800 : 600, textDecoration: "none" };
          // External link (e.g. online shop) opens in a new tab; others switch tab.
          if (it.href) {
            return h("a", { key: it.id, href: it.href, target: "_blank", rel: "noopener noreferrer", style }, ...inner);
          }
          return h("button", {
            key: it.id, onClick: () => { closeDetail(); setTab(it.id); }, style,
          }, ...inner);
        }))),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

  </script>
  <!-- APP:END -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
